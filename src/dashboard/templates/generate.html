{% extends "base.html" %}
{% block title %}Generate{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Generate Template</h1>
    <p>Manually trigger template generation and listing</p>
</div>

<div class="card" style="max-width: 640px;">
    <div class="form-group">
        <label>Template Category</label>
        <select id="category" class="input-field">
            <option value="Habit Tracker">Habit Tracker</option>
            <option value="Project Management">Project Management</option>
            <option value="Finance Tracker">Finance Tracker</option>
            <option value="Content Calendar">Content Calendar</option>
            <option value="Student Dashboard">Student Dashboard</option>
            <option value="Goal Tracker">Goal Tracker</option>
            <option value="Client CRM">Client CRM</option>
            <option value="Freelance Tracker">Freelance Tracker</option>
            <option value="Reading List">Reading List</option>
            <option value="Fitness Tracker">Fitness Tracker</option>
            <option value="Weekly Planner">Weekly Planner</option>
            <option value="Blog Editorial">Blog Editorial</option>
            <option value="Business Planner">Business Planner</option>
            <option value="Social Media Manager">Social Media Manager</option>
        </select>
    </div>
    <div class="form-group">
        <label>Description (optional)</label>
        <input id="description" type="text" class="input-field" placeholder="e.g. For freelance designers tracking multiple client projects">
    </div>
    <div style="display: flex; gap: 12px;">
        <button class="btn btn-primary" onclick="generate()" id="gen-btn">Generate & List</button>
    </div>
</div>

<div id="result" style="margin-top: 24px;"></div>

<script>
async function generate() {
    const btn = document.getElementById('gen-btn');
    const category = document.getElementById('category').value;
    const description = document.getElementById('description').value;
    const result = document.getElementById('result');

    btn.disabled = true;
    btn.textContent = 'Generating...';
    result.innerHTML = '<div class="card"><p style="color: var(--text-muted);">AI is generating your template and posting to all marketplaces. This may take a few seconds...</p></div>';

    try {
        const res = await fetch(`/api/generate?category=${encodeURIComponent(category)}&description=${encodeURIComponent(description)}`, { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Generation failed');

        let html = '<div class="card"><h3 style="color: var(--green); margin-bottom: 12px;">✓ Generated Successfully</h3>';
        html += `<p style="margin-bottom: 8px;"><strong>${data.template.title}</strong></p>`;
        html += `<p style="color: var(--text-muted); font-size: 13px;">${data.template.tagline}</p>`;
        html += '<div style="margin-top: 16px;"><strong style="font-size: 12px; color: var(--text-muted); text-transform: uppercase;">Listed on:</strong>';
        for (const [mp, info] of Object.entries(data.listings)) {
            if (info.error) {
                html += `<div style="margin-top: 8px; color: var(--red); font-size: 13px;">${mp}: Failed — ${info.error}</div>`;
            } else {
                html += `<div style="margin-top: 8px; color: var(--green); font-size: 13px;">${mp}: ✓ Listed (${info.listing_id})</div>`;
            }
        }
        html += '</div></div>';
        result.innerHTML = html;
    } catch (e) {
        result.innerHTML = `<div class="card" style="border-color: var(--red);"><p style="color: var(--red);">Error: ${e.message}</p></div>`;
    } finally {
        btn.disabled = false;
        btn.textContent = 'Generate & List';
    }
}
</script>
{% endblock %}
